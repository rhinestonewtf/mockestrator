name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Start Anvil forks
        run: docker compose up -d
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}

      - name: Wait for Anvil forks
        run: |
          for port in 30005 30006 30007; do
            for i in $(seq 1 30); do
              if curl -sf -X POST -H 'Content-Type: application/json' \
                -d '{"method":"eth_blockNumber","params":[],"id":1,"jsonrpc":"2.0"}' \
                "http://localhost:$port" > /dev/null 2>&1; then
                echo "Port $port ready"
                break
              fi
              sleep 2
            done
          done

      - name: Start mockestrator
        run: pnpm start &
        env:
          PORT: 4000

      - name: Wait for mockestrator
        run: |
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null "http://localhost:4000" 2>/dev/null || \
               [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:4000 2>/dev/null)" = "503" ]; then
              echo "Mockestrator ready"
              break
            fi
            sleep 2
          done

      - run: pnpm test
